name: tune_bridge
description: "Sync Spotify library and stream via YouTube — ad-free."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: any
  equatable: any

  # Networking
  http: any
  url_launcher: any

  # YouTube
  youtube_explode_dart: any

  # Audio playback
  just_audio: any
  audio_service: any
  audio_session: any

  # Local storage
  hive: any
  hive_flutter: any

  # UI helpers
  cupertino_icons: any
  cached_network_image: any
  shimmer: any
  google_fonts: any
  palette_generator: ^0.3.3+7

  # Utilities
  get_it: any
  logger: any
  path_provider: ^2.1.5
  dio: ^5.9.2
  permission_handler: ^12.0.1
  flutter_appauth: ^8.0.3
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/app_logo.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_logo.png"
    icon_size: 48 # min:48, max:256, default: 48

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/app_logo.png
